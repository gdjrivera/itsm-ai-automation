services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["src.services.orchestrator"]
    networks:
      - itsm-net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["src.workers.ticket_worker"]
    networks:
      - itsm-net

networks:
  itsm-net:
    driver: bridge
